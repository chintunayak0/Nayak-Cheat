<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nayak Admin Panel</title>
    <style>
        body {
            background: #0a0f1f;
            font-family: monospace;
            padding: 2rem;
            color: #0ff;
        }
        .admin-box {
            max-width: 800px;
            margin: auto;
            background: #111;
            padding: 2rem;
            border: 2px solid cyan;
            border-radius: 20px;
        }
        button {
            background: cyan;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        input {
            padding: 8px;
            margin: 5px;
            width: 80%;
        }
        .log {
            background: #000;
            height: 200px;
            overflow-y: auto;
            padding: 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="admin-box">
    <h2>🔐 NAYAK ADMIN v1.0</h2>
    <p>Welcome, Master. Only you can access this.</p>
    
    <h3>🎮 Cheat Toggles</h3>
    <button onclick="toggle('aimbot')">Aimbot (ON/OFF)</button>
    <button onclick="toggle('esp')">ESP (ON/OFF)</button>
    <button onclick="toggle('trigger')">Triggerbot (ON/OFF)</button>
    
    <h3>📢 Broadcast Message</h3>
    <input type="text" id="msg" placeholder="Type your announcement">
    <button onclick="broadcast()">Send to Users</button>
    
    <h3>📜 Activity Logs</h3>
    <div class="log" id="log"></div>
    
    <button onclick="clearLogs()">Clear Logs</button>
    <button onclick="location.href='/'">Back to Main Site</button>
</div>

<script>
    let logs = ["✅ Admin panel loaded"];
    const logDiv = document.getElementById('log');
    
    function addLog(msg) {
        logs.unshift(`[${new Date().toLocaleTimeString()}] ${msg}`);
        if(logs.length > 20) logs.pop();
        logDiv.innerHTML = logs.map(l => `<div>${l}</div>`).join('');
    }
    
    function toggle(module) {
        addLog(`🔄 ${module} toggled by admin`);
        alert(`${module} module toggled! (simulation)`);
    }
    
    function broadcast() {
        let msg = document.getElementById('msg').value;
        if(msg) {
            addLog(`📢 Broadcast: "${msg}"`);
            alert(`Message sent to all users: ${msg}`);
            document.getElementById('msg').value = '';
        }
    }
    
    function clearLogs() {
        logs = ["🧹 Logs cleared"];
        addLog("Logs reset");
    }
    
    addLog("🔓 Secure admin session started");
</script>
</body>
</html>
